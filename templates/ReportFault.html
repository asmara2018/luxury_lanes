<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>Report Fault - Luxury Lanes</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, sans-serif;
}

body {
    display: flex;
    min-height: 100vh;
    background: #CFFDFF;
}

.nav-panel {
    width: 240px;
    background: #1f2937;
    color: white;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
}

.nav-panel h2 {
    text-align: center;
    margin-bottom: 30px;
}

.nav-links {
    flex: 1;
}

.nav-links a {
    display: block;
    padding: 15px 25px;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.nav-links a:hover {
    background: #374151;
    color: white;
}

.nav-links a.current {
    background: #2563eb;
    color: white;
}

.nav-bottom {
    padding: 15px 25px;
    border-top: 1px solid #374151;
}

.nav-bottom a {
    display: block;
    padding: 10px 0;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.nav-bottom a:hover {
    color: white;
}

.content-area {
    flex: 1;
    padding: 30px;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.page-header h1 {
    font-size: 22px;
}

.page-header p {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
}

.staff-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    padding: 8px 14px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.85);
}

.staff-initial {
    width: 32px;
    height: 32px;
    background: #2563eb;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.fault-log {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    max-width: 650px;
}

.fault-log h3 {
    margin-bottom: 20px;
    font-size: 16px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 5px;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 14px;
    font-family: Segoe UI, sans-serif;
    outline: none;
}

.form-group textarea {
    resize: vertical;
    min-height: 110px;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}

.submit-btn:hover {
    opacity: 0.9;
}

</style>
</head>

<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>

    <nav class="nav-links">
        <a href="Dashboard.html">Dashboard</a>
        <a href="ReportFault.html" class="current">Report Fault</a>
        <a href="AssignJob.html">Assign Jobs</a>
        <a href="Analytics.html">Analytics</a>
        <a href="Notifications.html">Notifications</a>
        <a href="Feedback.html">Feedback</a>
    </nav>

    <div class="nav-bottom">
        <a href="login.html">Log Out</a>
    </div>
</aside>

<main class="content-area">

    <div class="page-header">
        <div>
            <h1>Report a Fault</h1>
            <p>Submit a new maintenance request</p>
        </div>
        <div class="staff-info">
            <div class="staff-initial">M</div>
            <span>Manager</span>
        </div>
    </div>

    <div class="fault-log">
        <h3>New Fault Report</h3>

        <div class="form-group">
            <label for="room">Room Number</label>
            <input type="text" id="room" placeholder="e.g. 101">
        </div>

        <div class="form-group">
            <label for="title">Issue Title</label>
            <input type="text" id="title" placeholder="e.g. Broken air conditioning">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Describe the fault in detail..."></textarea>
        </div>

        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="attachment">Attach File (Optional)</label>
            <input type="file" id="attachment" accept="image/*,.pdf">
        </div>

        <button class="submit-btn">Submit Fault Report</button>

    </div>

</main>

</body>
</html>
