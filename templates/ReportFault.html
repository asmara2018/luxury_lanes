<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Fault - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
.fault-form { max-width: 580px; }
.submit-btn {
    width: 100%; padding: 12px; background: #2563eb; color: white;
    border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 6px; font-family: 'Segoe UI', Arial, sans-serif;
    transition: background 0.15s;
}
.submit-btn:hover    { background: #1d4ed8; }
.submit-btn:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-bottom">
        <a href="Login.html" onclick="logout()">Log Out</a>
    </div>
</aside>

<main class="content-area">
    <div class="page-header">
        <div>
            <h1>Report Fault</h1>
            <p>Submit a maintenance request and we will respond promptly</p>
        </div>
    </div>

    <div class="fault-log fault-form">
        <h3>New Fault Report</h3><br>
        <div id="okMsg"  class="ok-msg"></div>
        <div id="errMsg" class="err-msg"></div>
        <div class="form-group">
            <label>Room Number</label>
            <input type="text" id="room" placeholder="e.g. 101">
        </div>
        <div class="form-group">
            <label>Issue Title</label>
            <input type="text" id="title" placeholder="e.g. Broken air conditioning">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="description" placeholder="Describe the fault in detail..."></textarea>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select id="priority">
                <option value="Low">Low - Minor inconvenience</option>
                <option value="Medium" selected>Medium - Needs attention soon</option>
                <option value="High">High - Urgent, affects safety or comfort</option>
            </select>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitFault()">Submit Fault Report</button>
    </div>
</main>

<script>

    // get the current users details that were saved when they logged in
    var userId = localStorage.getItem('user_id');
    var role   = localStorage.getItem('role');

    // if nobody is logged in send them back to the login page
    if (!userId)      {
        window.location.href = 'Login.html';
    }

    // build nav links based on role
    var nav = document.getElementById('navLinks');

    nav.innerHTML += '<a href="Dashboard.html">Dashboard</a>';

    if (role === 'Guest' || role === 'Staff' || role === 'Manager') {
        nav.innerHTML += '<a href="ReportFault.html" class="current">Report Fault</a>';
        nav.innerHTML += '<a href="View Requests.html">View Requests</a>';
    }

    if (role === 'Subcontractor') {
        nav.innerHTML += '<a href="ViewJobs.html">My Jobs</a>';
    }

    if (role === 'Staff' || role === 'Manager') {
        nav.innerHTML += '<a href="AssignJob.html">Assign Jobs</a>';
    }

    if (role === 'Manager') {
        nav.innerHTML += '<a href="Analytics.html">Analytics</a>';
    }

    nav.innerHTML += '<a href="Notifications.html">Notifications</a>';
    nav.innerHTML += '<a href="Feedback.html">Feedback</a>';

    function logout() {
        fetch('http://127.0.0.1:5000/logout', { method: 'POST', credentials: 'include' });
        localStorage.clear();
    }

    // runs when the submit button is clicked
    function submitFault() {

        // get the values from the form fields
        var room        = document.getElementById('room').value.trim();
        var title       = document.getElementById('title').value.trim();
        var description = document.getElementById('description').value.trim();
        var priority    = document.getElementById('priority').value;

        // check all fields are filled before sending anything
        if (room === '') {
            alert('Please enter a room number.');
            return;
        }

        if (title === '') {
            alert('Please enter an issue title.');
            return;
        }

        if (description === '') {
            alert('Please enter a description.');
            return;
        }

        // send the data to the Flask backend
        fetch('http://127.0.0.1:5000/report-fault', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id:     userId,
                room:        room,
                title:       title,
                description: description,
                priority:    priority
            })
        })
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                alert('Fault reported successfully. Reference number is #' + data.request_id);
                window.location.href = 'Dashboard.html';
            } else {
                alert('Something went wrong. Please try again.');
            }
        })
        .catch(function() {
            alert('Cannot connect to server. Is Server.py running?');
        });

    }

</script>
</body>
</html>
