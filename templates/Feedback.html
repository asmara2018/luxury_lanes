<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
/* ── Star rating — inputs BEFORE labels, reverse order, then CSS sibling trick ── */
.star-group { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; margin-top: 4px; }
.star-group input[type="radio"] { display: none; }
.star-group label {
    font-size: 30px; color: #d1d5db; cursor: pointer;
    transition: color 0.1s; line-height: 1;
}
/* Highlight the selected star and all stars before it (visually after in row-reverse layout) */
.star-group input[type="radio"]:checked ~ label,
.star-group label:hover,
.star-group label:hover ~ label { color: #f59e0b; }

.submit-btn {
    width: 100%; padding: 12px; background: #2563eb; color: white; border: none;
    border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px;
    font-family: 'Segoe UI', Arial, sans-serif; transition: background 0.15s;
}
.submit-btn:hover    { background: #1d4ed8; }
.submit-btn:disabled { opacity: 0.6; cursor: default; }
.guest-col { display: none; }
</style>
</head>
<body>
<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-bottom"><a href="Login.html" onclick="logout()">Log Out</a></div>
</aside>
<main class="content-area">
    <div class="page-header">
        <div>
            <h1>Feedback</h1>
            <p id="pageSubtitle">Rate a completed maintenance request</p>
        </div>
        <div class="staff-info">
            <div class="staff-initial" id="userInitial">?</div>
            <span id="userName">User</span>
        </div>
    </div>

    <!-- Submit form -->
    <div class="fault-log" style="max-width:560px;margin-bottom:24px;">
        <h3>Submit Feedback</h3><br>
        <div id="okMsg"  class="ok-msg"></div>
        <div id="errMsg" class="err-msg"></div>
        <div class="form-group">
            <label>Completed Request</label>
            <select id="requestSelect">
                <option value="">-- Select a completed request --</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rating</label>
            <!-- Inputs in reverse (5→1) then labels in reverse — CSS :checked ~ label works correctly -->
            <div class="star-group">
                <input type="radio" name="rating" id="s5" value="5">
                <input type="radio" name="rating" id="s4" value="4">
                <input type="radio" name="rating" id="s3" value="3">
                <input type="radio" name="rating" id="s2" value="2">
                <input type="radio" name="rating" id="s1" value="1">
                <label for="s5">★</label>
                <label for="s4">★</label>
                <label for="s3">★</label>
                <label for="s2">★</label>
                <label for="s1">★</label>
            </div>
        </div>
        <div class="form-group">
            <label>Comments (optional)</label>
            <textarea id="comments" placeholder="Describe your experience..."></textarea>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">Submit Feedback</button>
    </div>

    <!-- Past feedback table -->
    <div class="fault-log">
        <h3 style="margin-bottom:12px;">Previous Feedback</h3>
        <table>
            <thead>
                <tr>
                    <th>Request</th><th>Room</th><th>Rating</th>
                    <th class="guest-col" id="guestColHead">Guest</th>
                    <th>Comments</th><th>Date</th>
                </tr>
            </thead>
            <tbody id="feedbackTable">
                <tr><td colspan="6" style="padding:14px 0;color:#9ca3af;text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</main>
<script>
var API  = 'http://127.0.0.1:5000';
var uid  = localStorage.getItem('user_id');
var role = localStorage.getItem('role') || '';
var name = localStorage.getItem('name') || 'User';

document.getElementById('userName').textContent    = name;
document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();

// Staff/Manager/Subcontractor see guest name column in the table
if (role === 'Manager' || role === 'Staff' || role === 'Subcontractor') {
    document.getElementById('guestColHead').style.display = '';
    document.getElementById('pageSubtitle').textContent   = 'View all guest feedback';
}

(function buildNav() {
    var links = [
        { href: 'Dashboard.html',       label: 'Dashboard',     roles: ['Guest','Staff','Subcontractor','Manager'] },
        { href: 'ReportFault.html',     label: 'Report Fault',  roles: ['Guest','Staff','Manager'] },
        { href: 'AssignJob.html',       label: 'Assign Jobs',   roles: ['Staff','Manager'] },
        { href: 'ViewJobs.html',        label: 'My Jobs',       roles: ['Subcontractor'] },
        { href: 'View Requests.html',   label: 'View Requests', roles: ['Guest','Staff','Manager'] },
        { href: 'Analytics.html',       label: 'Analytics',     roles: ['Manager'] },
        { href: 'Notifications.html',   label: 'Notifications', roles: ['Guest','Staff','Subcontractor','Manager'] },
        { href: 'Feedback.html',        label: 'Feedback',      roles: ['Guest','Staff','Subcontractor','Manager'] },
    ];
    var nav = document.getElementById('navLinks');
    links.filter(function(l) { return l.roles.indexOf(role) !== -1; })
         .forEach(function(l) {
             var a = document.createElement('a');
             a.href = l.href; a.textContent = l.label;
             if (l.href === 'Feedback.html') a.className = 'current';
             nav.appendChild(a);
         });
})();

function logout() { fetch(API+'/logout',{method:'POST',credentials:'include'}); localStorage.clear(); }

function loadCompletedRequests() {
    fetch(API + '/requests?user_id=' + uid, { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!Array.isArray(data)) return;
        var completed = data.filter(function(r) { return r.status === 'Completed'; });
        var sel = document.getElementById('requestSelect');
        sel.innerHTML = '<option value="">-- Select a completed request --</option>';
        if (completed.length === 0) {
            sel.innerHTML += '<option disabled>No completed requests yet</option>';
            return;
        }
        completed.forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = '#'+r.id+' — Room '+r.room+' — '+r.title;
            sel.appendChild(opt);
        });
    });
}

function loadFeedback() {
    fetch(API + '/feedback?user_id=' + uid, { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var tbody   = document.getElementById('feedbackTable');
        var showGuest = (role === 'Manager' || role === 'Staff' || role === 'Subcontractor');
        var cols    = showGuest ? 6 : 5;
        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="'+cols+'" style="padding:14px 0;color:#9ca3af;text-align:center;">No feedback yet.</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(function(f) {
            var stars = '';
            for (var i = 0; i < 5; i++) stars += i < f.rating ? '★' : '☆';
            var date      = f.created_at ? f.created_at.split(' ')[0] : '-';
            var guestCell = showGuest ? '<td style="display:table-cell;">'+(f.guest_name||'—')+'</td>' : '';
            return '<tr>' +
                '<td>'+(f.title||'#'+f.request_id)+'</td>' +
                '<td>Room '+(f.room_number||'—')+'</td>' +
                '<td style="color:#f59e0b;font-size:17px;letter-spacing:1px;">'+stars+'</td>' +
                guestCell +
                '<td style="color:#6b7280;font-size:12px;">'+(f.comments||'—')+'</td>' +
                '<td>'+date+'</td>' +
                '</tr>';
        }).join('');
    })
    .catch(function() {
        document.getElementById('feedbackTable').innerHTML =
            '<tr><td colspan="5" style="color:#dc2626;padding:14px 0;text-align:center;">Cannot connect to server.</td></tr>';
    });
}

function submitFeedback() {
    var requestId = document.getElementById('requestSelect').value;
    var ratingEl  = document.querySelector('input[name="rating"]:checked');
    var comments  = document.getElementById('comments').value.trim();
    var btn       = document.getElementById('submitBtn');

    document.getElementById('okMsg').style.display  = 'none';
    document.getElementById('errMsg').style.display = 'none';

    if (!requestId) { showErr('Please select a request.'); return; }
    if (!ratingEl)  { showErr('Please select a star rating.'); return; }

    btn.disabled = true; btn.textContent = 'Submitting...';

    fetch(API + '/feedback', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            request_id: parseInt(requestId),
            rating:     parseInt(ratingEl.value),
            comments:   comments,
            user_id:    parseInt(uid)   // session fallback for file:// protocol
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            showOk('Thank you — your feedback has been submitted.');
            document.getElementById('requestSelect').value = '';
            document.querySelectorAll('input[name="rating"]').forEach(function(el) { el.checked = false; });
            document.getElementById('comments').value = '';
            loadFeedback();
        } else {
            showErr(data.error || 'Could not submit feedback.');
        }
        btn.disabled = false; btn.textContent = 'Submit Feedback';
    })
    .catch(function() {
        showErr('Cannot connect to server.');
        btn.disabled = false; btn.textContent = 'Submit Feedback';
    });
}

function showOk(msg)  { var e=document.getElementById('okMsg');  e.textContent=msg; e.style.display='block'; document.getElementById('errMsg').style.display='none'; }
function showErr(msg) { var e=document.getElementById('errMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('okMsg').style.display='none'; }

loadCompletedRequests();
loadFeedback();
</script>
</body>
</html>
