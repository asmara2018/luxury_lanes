<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
/* puts the stars in a row, reversed so the CSS trick works */
.star-group {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    gap: 4px;
    margin-top: 4px;
}

/* hides the actual radio buttons, we only want the stars visible */
.star-group input[type="radio"] {
    display: none;
}

/* stars start off grey */
.star-group label {
    font-size: 30px;
    color: grey;
    cursor: pointer;
}

/* turn amber when a star is selected or hovered over */
.star-group input[type="radio"]:checked ~ label,
.star-group label:hover,
.star-group label:hover ~ label {
    color: #f59e0b;
}
</style>
</head>
<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-bottom">
        <a href="Login.html">Log Out</a>
    </div>
</aside>

<main class="content-area">

    <div class="page-header">
        <div>
            <h1>Feedback</h1>
            <p>Guest Feedback and Ratings</p>
        </div>
    </div>

    <div class="fault-log">

        <div class="form-group">
            <label>Select your maintenance request:</label>
            <select id="completedRequestDropdown">
                <option value="">Select a request using the drop down below</option>
            </select>
        </div>

        <!-- star rating system -->
        <div class="form-group">
            <label>Rating:</label>

            <div class="star-group">

                <input type="radio" name="rating" id="star5" value="5">
                <input type="radio" name="rating" id="star4" value="4">
                <input type="radio" name="rating" id="star3" value="3">
                <input type="radio" name="rating" id="star2" value="2">
                <input type="radio" name="rating" id="star1" value="1">

                <label for="star5">★</label>
                <label for="star4">★</label>
                <label for="star3">★</label>
                <label for="star2">★</label>
                <label for="star1">★</label>

            </div>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea id="commentsBox" placeholder="Describe your experience"></textarea>
        </div>

        <button class="btn-primary" onclick="submitFeedback()">Submit Feedback</button>

    </div>

</main>

<script>

    // server address and logged in user info
    var serverAddress = "http://127.0.0.1:5000";
    var currentUserId = localStorage.getItem("user_id");
    var currentRole   = localStorage.getItem("role");



    // build navigation menu depending on the users role

    var nav = document.getElementById("navLinks");

    nav.innerHTML += "<a href='Dashboard.html'>Dashboard</a>";

    if (currentRole == "Guest" || currentRole == "Staff" || currentRole == "Manager") {

        nav.innerHTML += "<a href='ReportFault.html'>Report Fault</a>";
        nav.innerHTML += "<a href='View Requests.html'>View Requests</a>";

    }

    if (currentRole == "Subcontractor") {

        nav.innerHTML += "<a href='ViewJobs.html'>My Jobs</a>";

    }

    if (currentRole == "Staff" || currentRole == "Manager") {

        nav.innerHTML += "<a href='AssignJob.html'>Assign Jobs</a>";

    }

    if (currentRole == "Manager") {

        nav.innerHTML += "<a href='Analytics.html'>Analytics</a>";

    }

    nav.innerHTML += "<a href='Notifications.html'>Notifications</a>";
    nav.innerHTML += "<a href='Feedback.html' class='current'>Feedback</a>";



    // load completed requests for the dropdown

    fetch(serverAddress + currentUserId)

    .then(function(response) {

        return response.json();

    })




    .then(function(data) {

        for (var i = 0; i < data.length; i++) {

            if (data[i].status === "Completed") {

                var option = document.createElement("option");

                option.value = data[i].id;

                option.textContent =
                    "#" + data[i].id +
                    " Room- " + data[i].room +
                    " - " + data[i].title;

                document.getElementById("completedRequestDropdown").appendChild(option);

            }

        }

    });


    // this runs when the submit button is clicked

    function submitFeedback() {

        var requestId = document.getElementById("completedRequestDropdown").value;
        var rating    = document.querySelector("input[name='rating']:checked");
        var comments  = document.getElementById("commentsBox").value.trim();

        // check a request was selected

        if (requestId === "") {
            alert("Please select a request.");
            return;
        }



        // check a rating was selected
        if (rating === null) {
            alert("Please select a star rating.");
            return;
        }



        // send the feedback to the server

        fetch(serverAddress + "/feedback", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                request_id: parseInt(requestId),
                rating: parseInt(rating.value),
                comments: comments,
                user_id: parseInt(currentUserId)
            })

        })

        .then(function(response) {
            return response.json();
        })

        .then(function(data) {
            if (data.success) {
                alert("Thank you, your feedback has been submitted");
                window.location.href = "Dashboard.html";
            }

            else {
                alert("Could not submit feedback");
            }
        })

        .catch(function() {
            alert("Cannot connect to server. Is Server.py running?");
        });

    }

</script>

</body>
</html>
