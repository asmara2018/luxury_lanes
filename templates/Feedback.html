<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">

<link rel="stylesheet" href="CSS Luxury Lanes.css">
</head>

<body>
<aside class="nav-panel">
    <h2>Luxury Lanes</h2>

<nav class="nav-links">
<a href="Dashboard.html" >Dashboard</a>
<a href="ReportFault.html">Report Fault</a>
<a href="AssignJob.html">Assign Jobs</a>

</nav>

<div class="nav-bottom">
<a href="login.html">Log Out</a>
</div>
</aside>

<main class="content-area">

    <div class="page-header">
        <div>
            <h1>Feedback</h1>
            <p>Guest Feedback and Ratings</p>
        </div>
    </div>

    <form action="/submit_feedback" method="POST">

        <label for="request_id">Select your maintenance request:</label>
        <select name="request_id" id="request_id" required>
            <option value="">-- Select a request --</option>
            <option value="1">Room 101 - Leaking tap</option>
            <option value="2">Room 204 - Broken heater</option>
        </select>

        <br><br>

        <label>Rating:</label><br>
        <input type="radio" name="rating" value="1" required> 1 star
        <input type="radio" name="rating" value="2"> 2 stars
        <input type="radio" name="rating" value="3"> 3 stars
        <input type="radio" name="rating" value="4"> 4 stars
        <input type="radio" name="rating" value="5"> 5 stars

        <br><br>

        <label for="description">Description:</label><br>
        <textarea name="description" id="description" rows="4" cols="50" placeholder="Describe your experience..." required></textarea>

        <br><br>

        <label for="email">Email (optional - so staff can follow up):</label><br>
        <input type="email" name="email" id="email" placeholder="your@email.com">

        <br><br>

        <button type="submit">Submit Feedback</button>

    </form>

</main>
</body>
</html>
