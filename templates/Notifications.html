<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
.notif-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: #eff6ff; border-left: 3px solid #2563eb; }
.notif-item.read   { border-left: 3px solid transparent; }
.notif-type    { font-size: 11px; font-weight: 700; color: #2563eb; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.notif-message { font-size: 13px; color: #374151; line-height: 1.5; }
.notif-time    { font-size: 11px; color: #9ca3af; margin-top: 4px; }
.mark-btn { padding: 7px 14px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Segoe UI', Arial, sans-serif; }
.mark-btn:hover { background: #e5e7eb; }
.type-Confirmation { color: #16a34a; }
.type-Assignment   { color: #2563eb; }
.type-Completed    { color: #065f46; }
.type-New          { color: #dc2626; }
</style>
</head>
<body>
<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-bottom"><a href="Login.html" onclick="logout()">Log Out</a></div>
</aside>
<main class="content-area">
    <div class="page-header">
        <div>
            <h1>Notifications</h1>
            <p id="unreadLabel">Loading...</p>
        </div>
        <div class="staff-info">
            <div class="staff-initial" id="userInitial">?</div>
            <span id="userName">User</span>
        </div>
    </div>
    <div class="fault-log">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h3>Your Notifications</h3>
            <button class="mark-btn" onclick="markAllRead()">Mark all as read</button>
        </div>
        <div id="notifList">
            <div style="padding:24px 0;color:#9ca3af;font-size:13px;text-align:center;">Loading...</div>
        </div>
    </div>
</main>
<script>

    var API  = 'http://127.0.0.1:5000';
    var uid  = localStorage.getItem('user_id');
    var role = localStorage.getItem('role');

    // build nav links based on role
    var nav = document.getElementById('navLinks');

    nav.innerHTML += '<a href="Dashboard.html">Dashboard</a>';

    if (role === 'Guest' || role === 'Staff' || role === 'Manager') {
        nav.innerHTML += '<a href="ReportFault.html">Report Fault</a>';
        nav.innerHTML += '<a href="View Requests.html">View Requests</a>';
    }

    if (role === 'Subcontractor') {
        nav.innerHTML += '<a href="ViewJobs.html">My Jobs</a>';
    }

    if (role === 'Staff' || role === 'Manager') {
        nav.innerHTML += '<a href="AssignJob.html">Assign Jobs</a>';
    }

    if (role === 'Manager') {
        nav.innerHTML += '<a href="Analytics.html">Analytics</a>';
    }

    nav.innerHTML += '<a href="Notifications.html" class="current">Notifications</a>';
    nav.innerHTML += '<a href="Feedback.html">Feedback</a>';

    function logout() {
        fetch(API + '/logout', { method: 'POST', credentials: 'include' });
        localStorage.clear();
    }

    // fetch notifications from flask and display them
    function loadNotifications() {

        fetch(API + '/notifications?user_id=' + uid, { credentials: 'include' })

        .then(function(response) {
            return response.json();
        })

        .then(function(data) {

            var list   = data.notifications || [];
            var unread = data.unread_count  || 0;

            // update the unread count label at the top
            if (unread > 0) {
                document.getElementById('unreadLabel').textContent = unread + ' unread notification(s)';
            } else {
                document.getElementById('unreadLabel').textContent = 'All caught up - no unread notifications';
            }

            var container = document.getElementById('notifList');

            // show a message if there are no notifications
            if (list.length === 0) {
                container.innerHTML = '<p>No notifications yet.</p>';
                return;
            }

            // build the notification items
            var html = '';

            for (var i = 0; i < list.length; i++) {
                var n    = list[i];
                var time = n.created_at ? n.created_at.replace('T', ' ') : '-';
                var readClass = n.is_read ? 'read' : 'unread';

                html += '<div class="notif-item ' + readClass + '">';
                html += '<div class="notif-type">'    + n.type    + '</div>';
                html += '<div class="notif-message">' + n.message + '</div>';
                html += '<div class="notif-time">'    + time      + '</div>';
                html += '</div>';
            }

            container.innerHTML = html;
        })

        .catch(function() {
            document.getElementById('notifList').innerHTML = '<p>Cannot connect to server.</p>';
        });
    }

    // mark all notifications as read then reload the list
    function markAllRead() {
        fetch(API + '/notifications/read?user_id=' + uid, { method: 'PUT', credentials: 'include' })
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                loadNotifications();
            }
        });
    }

    loadNotifications();


</script>
</body>
</html>
