<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
.notif-item          { padding:14px 16px; border-bottom:1px solid #f1f5f9; }
.notif-item:last-child { border-bottom:none; }
.notif-item.unread   { background:#eff6ff; border-left:3px solid #2563eb; }
.notif-item.read     { border-left:3px solid transparent; }
.notif-type          { font-size:11px; font-weight:600; color:#2563eb; text-transform:uppercase; margin-bottom:3px; }
.notif-message       { font-size:13px; color:#374151; line-height:1.5; }
.notif-time          { font-size:11px; color:#9ca3af; margin-top:4px; }
.mark-read-btn       { padding:7px 14px; background:#f3f4f6; border:1px solid #e5e7eb; border-radius:6px; font-size:12px; cursor:pointer; }
.mark-read-btn:hover { background:#e5e7eb; }
</style>
</head>
<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links">
        <a href="Dashboard.html">Dashboard</a>
        <a href="ReportFault.html">Report Fault</a>
        <a href="AssignJob.html">Assign Jobs</a>
        <a href="View Requests.html">View Requests</a>
        <a href="Analytics.html">Analytics</a>
        <a href="Notifications.html" class="current">Notifications</a>
        <a href="Feedback.html" >Feedback</a>
    </nav>
    <div class="nav-bottom">
        <a href="Login.html">Log Out</a>
    </div>
</aside>

<main class="content-area">
    <div class="page-header">
        <div>
            <h1>Notifications</h1>
            <p id="unreadLabel">Loading...</p>
        </div>
        <div class="staff-info">
            <div class="staff-initial" id="userInitial">?</div>
            <span id="userName">Loading...</span>
        </div>
    </div>

    <div class="fault-log">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h3>Your Notifications</h3>
            <button class="mark-read-btn" onclick="markAllRead()">Mark all as read</button>
        </div>
        <div id="notifList">
            <div style="padding:24px 0;color:#9ca3af;font-size:13px;text-align:center;">Loading...</div>
        </div>
    </div>
</main>

<script src="nav.js"></script>
<script>
var API = 'http://127.0.0.1:5000';
buildNav('Notifications.html');

function logout() {
    fetch(API + '/logout', { method: 'POST', credentials: 'include' });
    localStorage.clear();
}

function loadNotifications() {
    fetch(API + '/notifications', { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var list   = data.notifications || [];
        var unread = data.unread_count  || 0;
        document.getElementById('unreadLabel').textContent = unread>0 ? unread+' unread notification(s)' : 'All caught up';

        var container = document.getElementById('notifList');
        if (list.length === 0) {
            container.innerHTML = '<div style="padding:24px 0;color:#9ca3af;font-size:13px;text-align:center;">You have no notifications yet.</div>';
            return;
        }
        container.innerHTML = list.map(function(n) {
            var time = n.created_at ? n.created_at.split(' ')[0] : '-';
            return '<div class="notif-item '+(n.is_read?'read':'unread')+'">' +
                '<div class="notif-type">'+(n.type||'Update')+'</div>' +
                '<div class="notif-message">'+n.message+'</div>' +
                '<div class="notif-time">'+time+'</div></div>';
        }).join('');
    })
    .catch(function() {
        document.getElementById('notifList').innerHTML =
            '<div style="color:#dc2626;padding:24px 0;text-align:center;">Cannot connect to server.</div>';
    });
}

function markAllRead() {
    fetch(API + '/notifications/read', { method: 'PUT', credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.success) loadNotifications(); });
}

loadNotifications();
</script>
</body>
</html>
