<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard – Luxury Lanes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, monospace;
}

body {
    background-color: #CFFDFF;
    min-height: 100vh;
    display: flex;
}

.sidebar {
    width: 220px;
    min-height: 100vh;
    background: white;
    display: flex;
    flex-direction: column;
    box-shadow: 3px 0 15px rgba(0,0,0,0.08);
}

.sidebar-brand {
    text-align: center;
    padding: 28px 20px;
    border-bottom: 1px solid #e8f4f4;
}

.sidebar-brand h2 {
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight: 700;
}

.nav-links {
    list-style: none;
    flex: 1;
}

.nav-links li a {
    display: block;
    padding: 13px 24px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    color: #555;
    border-left: 3px solid transparent;
}

.nav-links li a:hover,
.nav-links li a.active {
    background: #f0faff;
    color: #3578e5;
    border-left: 3px solid #3578e5;
}

.sidebar-footer {
    padding: 18px;
    border-top: 1px solid #e8f4f4;
}

.btn-logout {
    width: 100%;
    padding: 10px;
    border: 2px solid #e05252;
    background: white;
    color: #e05252;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

.btn-logout:hover {
    background: #e05252;
    color: white;
}

.main {
    flex: 1;
    padding: 35px 40px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 28px;
}

.stat-card {
    background: white;
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.07);
}

.stat-card.total  { border-left: 4px solid #3578e5; }
.stat-card.high   { border-left: 4px solid #e05252; }
.stat-card.medium { border-left: 4px solid #f0a500; }
.stat-card.low    { border-left: 4px solid #27ae60; }

.stat-card .value {
    font-size: 32px;
    font-weight: 700;
    margin-top: 6px;
}

.section-card {
    background: white;
    border-radius: 14px;
    padding: 26px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.07);
}

.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
}

.badge.high {
    background: #fde8e8;
    color: #c0392b;
}

.badge.medium {
    background: #fef3e0;
    color: #d68910;
}

.badge.low {
    background: #e6f9f0;
    color: #1e8449;
}

.status-badge.reported {
    background: #eef2ff;
    color: #3578e5;
}

.status-badge.in-progress {
    background: #fff8e1;
    color: #f0a500;
}

.status-badge.completed {
    background: #e6f9f0;
    color: #1e8449;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

</style>
</head>

<body>

<aside class="sidebar">

    <div class="sidebar-brand">
        <h2>Luxury Lanes</h2>
        <p>Manager</p>
    </div>

    <ul class="nav-links">
        <li><a href="Dashboard.html" class="active">Dashboard</a></li>
        <li><a href="Report Fault.html">Report a Fault</a></li> <!-- FIXED -->
        <li><a href="ManageRequests.html">Manage Requests</a></li>
        <li><a href="ManageRooms.html">Assign a Job</a></li>
        <li><a href="Analytics.html">Analytics</a></li>
        <li><a href="Feedback.html">Feedback</a></li>
    </ul>

    <div class="sidebar-footer">
        <button class="btn-logout">Log Out</button>
    </div>

</aside>

<main class="main">

<h1 style="margin-bottom:20px;">Dashboard</h1>

<div class="stats-grid">

    <div class="stat-card total">
        <div>Total Requests</div>
        <div class="value">0</div>
    </div>

    <div class="stat-card high">
        <div>High Priority</div>
        <div class="value">0</div>
    </div>

    <div class="stat-card medium">
        <div>Medium Priority</div>
        <div class="value">0</div>
    </div>

    <div class="stat-card low">
        <div>Low Priority</div>
        <div class="value">0</div>
    </div>

</div>

<div class="section-card">

<h2>Maintenance Requests</h2>

<br>

<table>
<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>

<tbody id="requestsTableBody">
<tr>
<td colspan="6" style="text-align:center;">No maintenance requests found</td>
</tr>
</tbody>

</table>

</div>

</main>

</body>
</html>
