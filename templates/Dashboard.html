<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Lanes Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#CFFDFF;
display:flex;
min-height:100vh;
}

/* Sidebar */
.sidebar{
width:220px;
background:#fff;
box-shadow:3px 0 15px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
}

.sidebar-brand{
text-align:center;
padding:25px;
border-bottom:1px solid #e8f4f4;
}

.nav-links{
list-style:none;
flex:1;
}

.nav-link{
display:block;
padding:13px 24px;
text-decoration:none;
font-size:14px;
font-weight:600;
color:#555;
border-left:3px solid transparent;
}

.nav-link:hover,
.nav-link.active{
background:#f0faff;
color:#3578e5;
border-left:3px solid #3578e5;
}

/* Main */
.main{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.ubadge{
background:#fff;
padding:10px 15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#3578e5;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* Stats */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat{
background:#fff;
padding:22px;
border-radius:14px;
box-shadow:0 4px 18px rgba(0,0,0,.07);
}

.stat.blue{border-left:4px solid #3578e5}
.stat.red{border-left:4px solid #e05252}
.stat.orange{border-left:4px solid #f0a500}
.stat.green{border-left:4px solid #27ae60}

.val{
font-size:30px;
font-weight:700;
margin-top:8px;
}

.card{
background:#fff;
padding:25px;
border-radius:14px;
box-shadow:0 4px 18px rgba(0,0,0,.07);
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

thead th{
text-align:left;
padding:10px;
color:#999;
text-transform:uppercase;
font-size:11px;
border-bottom:2px solid #eee;
}

tbody td{
padding:10px;
border-bottom:1px solid #f3f3f3;
}

.btn-logout{
padding:10px;
width:100%;
border:none;
background:#e05252;
color:#fff;
cursor:pointer;
font-weight:600;
}

</style>

</head>

<body>

<!-- Sidebar -->
<aside class="sidebar">

<div class="sidebar-brand">
<h2>Luxury Lanes</h2>
<p id="sbRole">Dashboard</p>
</div>

<ul class="nav-links" id="navLinks"></ul>

<button class="btn-logout" onclick="logout()">Logout</button>

</aside>

<!-- Main -->
<main class="main">

<div class="topbar">
<div>
<h1 id="welcomeTitle">Welcome</h1>
<p id="welcomeSub">Dashboard</p>
</div>

<div class="ubadge">
<div class="avatar" id="avatarInit">?</div>
<div>
<strong id="badgeName">User</strong><br>
<span id="badgeRole">Role</span>
</div>
</div>
</div>

<!-- Stats -->
<div class="stats">

<div class="stat blue">
<div>Total Requests</div>
<div class="val" id="totalReq">0</div>
</div>

<div class="stat red">
<div>High Priority</div>
<div class="val" id="highReq">0</div>
</div>

<div class="stat orange">
<div>In Progress</div>
<div class="val" id="progressReq">0</div>
</div>

<div class="stat green">
<div>Completed</div>
<div class="val" id="completedReq">0</div>
</div>

</div>

<!-- Recent Requests -->
<div class="card">
<h2>Recent Requests</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
</tr>
</thead>

<tbody id="requestTable">
<tr>
<td colspan="5" style="text-align:center;color:#ccc;padding:30px">
Loading requests...
</td>
</tr>
</tbody>

</table>

</div>

</main>

<script>

/* Sidebar Navigation */
var NAV_LINKS={

Guest:[
{label:'Dashboard',href:'Dashboard.html'},
{label:'Report Fault',href:'ReportFault.html'},
{label:'My Requests',href:'ViewRequests.html'},
{label:'Feedback',href:'Feedback.html'},
{label:'Analytics',href:'Analytics.html'},
{label:'Notifications',href:'Notifications.html'}
],

Staff:[
{label:'Dashboard',href:'Dashboard.html'},
{label:'Report Fault',href:'ReportFault.html'},
{label:'My Tasks',href:'ViewRequests.html'},
{label:'Assign Job',href:'AssignJob.html'},
{label:'Feedback',href:'Feedback.html'},
{label:'Analytics',href:'Analytics.html'},
{label:'Notifications',href:'Notifications.html'}
],

Manager:[
{label:'Dashboard',href:'Dashboard.html'},
{label:'All Requests',href:'ViewRequests.html'},
{label:'Assign Job',href:'AssignJob.html'},
{label:'Manage Rooms',href:'ManageRooms.html'},
{label:'Analytics',href:'Analytics.html'},
{label:'Feedback',href:'Feedback.html'},
{label:'Notifications',href:'Notifications.html'}
]

};

function initNav(){

let roleRaw=localStorage.getItem("role")||"Guest";
let name=localStorage.getItem("name")||"User";

let role="Guest";

if(roleRaw.toLowerCase().includes("staff")) role="Staff";
else if(roleRaw.toLowerCase().includes("manager")) role="Manager";
else role="Guest";

document.getElementById("sbRole").textContent=role;

let links=NAV_LINKS[role];

document.getElementById("navLinks").innerHTML=
links.map(l=>{
return `<li><a class="nav-link" href="${l.href}">${l.label}</a></li>`;
}).join("");

document.getElementById("avatarInit").textContent=name.charAt(0).toUpperCase();
document.getElementById("badgeName").textContent=name;
document.getElementById("badgeRole").textContent=role;

document.getElementById("welcomeTitle").textContent="Welcome, "+name.split(" ")[0]+"!";
document.getElementById("welcomeSub").textContent=role+" Dashboard";

}

function logout(){
localStorage.clear();
window.location.href="Login.html";
}

initNav();

</script>

</body>
</html>
