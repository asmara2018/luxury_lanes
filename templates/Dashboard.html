<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>Maintenance Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#CFFDFF;
}

.nav-panel{
width:240px;
background:#1f2937;
color:white;
display:flex;
flex-direction:column;
padding-top:20px;
}

.nav-panel h2{
text-align:center;
margin-bottom:30px;
}

.nav-links{
flex:1;
}

.nav-links a{
display:block;
padding:15px 25px;
color:#cbd5e1;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.nav-links a:hover{
background:#374151;
color:white;
}

.nav-links a.current{
background:#2563eb;
color:white;
}

.nav-bottom{
padding:15px 25px;
border-top:1px solid #374151;
}

.nav-bottom a{
display:block;
padding:10px 0;
color:#cbd5e1;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.nav-bottom a:hover{
color:white;
}

.content-area{
flex:1;
padding:30px;
}

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.page-header h1{
font-size:22px;
}

.staff-info{
display:flex;
align-items:center;
gap:10px;
background:white;
padding:8px 14px;
border-radius:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.85);
}

.staff-initial{
width:32px;
height:32px;
background:#2563eb;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.request-summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.summary-tile{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.summary-tile p{
font-size:13px;
color:#6b7280;
}

.summary-tile h2{
margin-top:8px;
font-size:24px;
}

.tile-urgent{
border-top:4px solid #dc2626;
}

.tile-active{
border-top:4px solid #f59e0b;
}

.tile-resolved{
border-top:4px solid #16a34a;
}

.fault-log{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

thead th{
text-align:left;
font-size:11px;
text-transform:uppercase;
color:#9ca3af;
padding-bottom:10px;
border-bottom:2px solid #e5e7eb;
}

tbody td{
padding:12px 0;
border-bottom:1px solid #f1f5f9;
font-size:13px;
}

tbody tr:hover{
background:#f9fafb;
}

.priority-tag{
padding:4px 10px;
border-radius:12px;
font-size:11px;
color:white;
}

.priority-urgent{
background:#dc2626;
}

.priority-standard{
background:#f59e0b;
}

.priority-minor{
background:#16a34a;
}

</style>
</head>

<body>

<aside class="nav-panel">
\<h2>Luxury Lanes</h2>

<nav class="nav-links">
<a href="Dashboard.html" class="current">Dashboard</a>
<a href="ReportFault.html">Report Fault</a>
<a href="AssignJob.html">Assign Jobs</a>
<a href="Analytics.html">Analytics</a>
<a href="Notifications.html">Notifications</a>
<a href="Feedback.html">Feedback</a>
</nav>

<div class="nav-bottom">
<a href="login.html">Log Out</a>
</div>
</aside>

<main class="content-area">

<div class="page-header">
<div>
<h1 id="pageTitle">Dashboard Overview</h1>
<p>Maintenance Management System</p>
</div>

<div class="staff-info">
<div class="staff-initial">M</div>
<span id="staffName">Manager</span>
</div>
</div>

<section id="summaryPanel" class="request-summary">
<div class="summary-tile">
<p>Total Requests</p>
<h2>24</h2>
</div>

<div class="summary-tile tile-urgent">
<p>High Priority</p>
<h2>6</h2>
</div>

<div class="summary-tile tile-active">
<p>In Progress</p>
<h2>10</h2>
</div>

<div class="summary-tile tile-resolved">
<p>Completed</p>
<h2>8</h2>
</div>
</section>

<div class="fault-log">
<h3>Recent Maintenance Requests</h3>

<table id="faultTable">
<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Priority</th>
<th>Status</th>
<th>Assigned</th>
<th>Date</th>
</tr>
</thead>



</div>

</main>

</body>
</html>
