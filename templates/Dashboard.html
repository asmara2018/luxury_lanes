<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Luxury Lanes</title>
    <link rel="stylesheet" href="CSS Luxury Lanes.css">
</head>
<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-bottom">
        <a href="Login.html" onclick="logout()">Log Out</a>
    </div>
</aside>

<main class="content-area">

    <div class="page-header">
        <div>
            <h1>Dashboard</h1>
            <p>Maintenance Management System</p>
        </div>
    </div>

    <!-- four summary tiles -->
    <section class="request-summary">
        <div class="summary-tile">
            <p>Total Requests</p>
            <h2 id="totalCount">-</h2>
        </div>
        <div class="summary-tile tile-urgent">
            <p>High Priority</p>
            <h2 id="highCount">-</h2>
        </div>
        <div class="summary-tile tile-active">
            <p>In Progress</p>
            <h2 id="inProgressCount">-</h2>
        </div>
        <div class="summary-tile tile-resolved">
            <p>Completed</p>
            <h2 id="completedCount">-</h2>
        </div>
    </section>

    <!-- requests table -->
    <div class="fault-log">
        <h3>Recent Maintenance Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Room</th>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="requestTable">
                <tr><td colspan="6">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</main>

<script>

var serverAddress = 'http://127.0.0.1:5000';
var currentUserId = localStorage.getItem('user_id');
var currentRole   = localStorage.getItem('role');

// if nobody is logged in send them back to login
if (currentUserId === null) {
    window.location.href = 'Login.html';
}

// build the sidebar links based on the users role
function buildNav() {
    var allLinks = [
        { page: 'Dashboard.html',     label: 'Dashboard',     allowedRoles: ['Guest','Staff','Subcontractor','Manager'] },
        { page: 'ReportFault.html',   label: 'Report Fault',  allowedRoles: ['Guest','Staff','Manager'] },
        { page: 'AssignJob.html',     label: 'Assign Jobs',   allowedRoles: ['Staff','Manager'] },
        { page: 'ViewJobs.html',      label: 'My Jobs',       allowedRoles: ['Subcontractor'] },
        { page: 'View Requests.html', label: 'View Requests', allowedRoles: ['Guest','Staff','Manager'] },
        { page: 'Analytics.html',     label: 'Analytics',     allowedRoles: ['Manager'] },
        { page: 'Notifications.html', label: 'Notifications', allowedRoles: ['Guest','Staff','Subcontractor','Manager'] },
        { page: 'Feedback.html',      label: 'Feedback',      allowedRoles: ['Guest','Staff','Subcontractor','Manager'] },
    ];

    var nav = document.getElementById('navLinks');

    for (var i = 0; i < allLinks.length; i++) {
        var link = allLinks[i];
        if (link.allowedRoles.indexOf(currentRole) === -1) continue;
        var a = document.createElement('a');
        a.href = link.page;
        a.textContent = link.label;
        if (link.page === 'Dashboard.html') a.className = 'current';
        nav.appendChild(a);
    }
}

buildNav();

function logout() {
    fetch(serverAddress + '/logout', { method: 'POST', credentials: 'include' });
    localStorage.clear();
}

// fetch all requests from flask and update the tiles and table
function loadDashboard() {

    fetch(serverAddress + '/requests?user_id=' + currentUserId, { credentials: 'include' })

    .then(function(response) {
        return response.json();
    })

    .then(function(requests) {

        // count up the totals
        var totalCount      = requests.length;
        var highCount       = 0;
        var inProgressCount = 0;
        var completedCount  = 0;

        for (var i = 0; i < requests.length; i++) {
            if (requests[i].priority === 'High')       highCount++;
            if (requests[i].status === 'In Progress')  inProgressCount++;
            if (requests[i].status === 'Completed')    completedCount++;
        }

        // put the counts into the four tiles
        document.getElementById('totalCount').textContent      = totalCount;
        document.getElementById('highCount').textContent       = highCount;
        document.getElementById('inProgressCount').textContent = inProgressCount;
        document.getElementById('completedCount').textContent  = completedCount;

        // build the table rows for the reported maintenance requests
        var rows = '';

        for (var i = 0; i < requests.length; i++) {
            var r    = requests[i];
            var date = r.report_time ? r.report_time.split(' ')[0] : '-';
            rows += '<tr>';
            rows += '<td>#' + r.id + '</td>';
            rows += '<td>Room ' + r.room + '</td>';
            rows += '<td>' + r.title + '</td>';
            rows += '<td>' + r.priority + '</td>';
            rows += '<td>' + r.status + '</td>';
            rows += '<td>' + date + '</td>';
            rows += '</tr>';
        }

        document.getElementById('requestTable').innerHTML = rows;

    })

    .catch(function() {
        document.getElementById('requestTable').innerHTML =
            '<tr><td>Cannot connect to server. Is Server.py running?</td></tr>';
    });

}

loadDashboard();

</script>

</body>
</html>
