<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Job - Luxury Lanes</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, sans-serif;
}

body {
    display: flex;
    min-height: 100vh;
    background: #CFFDFF;
}

.nav-panel {
    width: 240px;
    background: #1f2937;
    color: white;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
}

.nav-panel h2 {
    text-align: center;
    margin-bottom: 30px;
}

.nav-links {
    flex: 1;
}

.nav-links a {
    display: block;
    padding: 15px 25px;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.nav-links a:hover {
    background: #374151;
    color: white;
}

.nav-links a.current {
    background: #2563eb;
    color: white;
}

.nav-bottom {
    padding: 15px 25px;
    border-top: 1px solid #374151;
}

.nav-bottom a {
    display: block;
    padding: 10px 0;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.nav-bottom a:hover {
    color: white;
}

.content-area {
    flex: 1;
    padding: 30px;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.page-header h1 {
    font-size: 22px;
}

.page-header p {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
}

.staff-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    padding: 8px 14px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.85);
}

.staff-initial {
    width: 32px;
    height: 32px;
    background: #2563eb;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.fault-log {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    max-width: 650px;
}

.fault-log h3 {
    margin-bottom: 20px;
    font-size: 16px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 5px;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 14px;
    font-family: Segoe UI, sans-serif;
    outline: none;
}

.form-group textarea {
    resize: vertical;
    min-height: 110px;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}

.submit-btn:hover {
    opacity: 0.9;
}
</style>

<aside class="nav-panel">
<h2>Luxury Lanes</h2>

<nav class="nav-links">
<a href="Dashboard.html" class="current">Dashboard</a>
<a href="ReportFault.html">Report Fault</a>
<a href="AssignJob.html">Assign Jobs</a>
<a href="Analytics.html">Analytics</a>
<a href="Notifications.html">Notifications</a>
<a href="Feedback.html">Feedback</a>
</nav>

<div class="nav-bottom">
<a href="login.html">Log Out</a>
</div>
</aside>

<main class="content-area">


<input type="hidden" id="selectedRequest">

<form id="assignForm">

<div class="form-group">
<label>Staff Search</label>
<input type="text" id="staffSearch" placeholder="Search staff">
<div id="staffSuggestions"></div>
</div>

<div class="form-group">
<label>Staff Email</label>
<input type="email" id="staffEmail" readonly>
</div>

<div class="form-group">
<label>Priority</label>
<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Notes</label>
<textarea id="notes"></textarea>
</div>

<button type="submit">Assign Job + Send Email</button>

</form>

</div>

</main>

<script>

/* Sidebar Navigation */
var NAV_LINKS={

Guest:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"Report a Fault",href:"ReportFault.html"},
{label:"My Requests",href:"ViewRequests.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Feedback",href:"Feedback.html"},
{label:"Notifications",href:"Notifications.html"}
],

Staff:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"Report a Fault",href:"ReportFault.html"},
{label:"My Tasks",href:"ViewRequests.html"},
{label:"Assign a Job",href:"AssignJob.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Notifications",href:"Notifications.html"}
],

Manager:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"All Requests",href:"ViewRequests.html"},
{label:"Assign a Job",href:"AssignJob.html"},
{label:"Manage Rooms",href:"ManageRooms.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Notifications",href:"Notifications.html"}
]

};

function initNav(currentPage){

let roleRaw=localStorage.getItem("role")||"Guest";
let name=localStorage.getItem("name")||"User";

let role="Guest";

if(roleRaw.toLowerCase().includes("staff")) role="Staff";
if(roleRaw.toLowerCase().includes("manager")) role="Manager";

document.getElementById("sbRole").textContent=role;

let links=NAV_LINKS[role];

document.getElementById("navLinks").innerHTML=
links.map(l=>{
let active=l.href===currentPage?" active":"";
return `<li><a href="${l.href}" class="nav-link${active}">${l.label}</a></li>`;
}).join("");

}

/* Logout */
function logout(){
localStorage.clear();
window.location.href="Login.html";
}

/* Load Requests */
async function loadRequests(){

const res=await fetch("http://127.0.0.1:5000/requests");
const data=await res.json();

let table=document.getElementById("requestTable");
table.innerHTML="";

data.forEach(req=>{
table.innerHTML+=`
<tr onclick="selectRequest(${req.id})">
<td><input type="radio" name="req"></td>
<td>${req.id}</td>
<td>${req.room}</td>
<td>${req.title}</td>
<td>${req.priority}</td>
<td>${req.status}</td>
</tr>
`;
});

}

function selectRequest(id){
document.getElementById("selectedRequest").value=id;
}

/* Staff Search */
document.getElementById("staffSearch").addEventListener("input", async function(){

let keyword=this.value;
if(keyword.length<2) return;

const res=await fetch("http://127.0.0.1:5000/staff");
const data=await res.json();

let box=document.getElementById("staffSuggestions");
box.innerHTML="";

data.forEach(staff=>{
if(staff.first_name.toLowerCase().includes(keyword.toLowerCase())){

let div=document.createElement("div");

div.textContent=staff.first_name+" "+staff.surname+" ("+staff.role+")";

div.onclick=()=>{
staffSearch.value=staff.first_name+" "+staff.surname;
staffEmail.value=staff.email;
box.innerHTML="";
};

box.appendChild(div);
}
});

});

/* Submit Assignment */
document.getElementById("assignForm").addEventListener("submit", async e=>{
e.preventDefault();

let requestId=document.getElementById("selectedRequest").value;

await fetch(`http://127.0.0.1:5000/requests/${requestId}/assign`,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
credentials:"include",
body:JSON.stringify({
assigned_to:1
})
});

alert("Job Assigned!");
loadRequests();

});

initNav("AssignJob.html");
loadRequests();

</script>

</body>
</html>
