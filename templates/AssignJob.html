<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Job - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
<style>
.form-group          { margin-bottom:16px; }
.form-group label    { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:5px; }
.form-group input,
.form-group select,
.form-group textarea { width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:6px; font-size:14px; font-family:Segoe UI,sans-serif; outline:none; }
.form-group textarea { resize:vertical; min-height:80px; }
.assign-btn          { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.assign-btn:hover    { opacity:0.9; }
.assign-btn:disabled { opacity:0.6; cursor:default; }
.ok-msg  { display:none; background:#d1fae5; color:#065f46; border-left:4px solid #16a34a; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:16px; }
.err-msg { display:none; background:#fee2e2; color:#dc2626; border-left:4px solid #dc2626; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:16px; }
.hint    { font-size:12px; color:#6b7280; margin-bottom:12px; }
tbody tr { cursor:pointer; }
tbody tr.selected-row { background:#eff6ff; }
.detail-box { background:#f8fafc; border:1px solid #e5e7eb; border-radius:6px; padding:12px 14px; margin-bottom:16px; font-size:13px; color:#374151; line-height:1.7; }
</style>
</head>
<body>

<aside class="nav-panel">
    <h2>Luxury Lanes</h2>
    <nav id="nav-links" class="nav-links"></nav>
    <div class="nav-bottom">
        <a href="Login.html" onclick="logout()">Log Out</a>
    </div>
</aside>

<main class="content-area">
    <div class="page-header">
        <div>
            <h1>Assign Job</h1>
            <p>Select a request and assign it to a subcontractor</p>
        </div>
        <div class="staff-info">
            <span id="userName"></span>
            <div class="staff-initial" id="userInitial">?</div>
        </div>
    </div>

    <div class="fault-log" style="margin-bottom:22px;">
        <h3>Step 1 — Select a Request</h3>
        <p class="hint">Click a row to select it</p>
        <table>
            <thead>
                <tr><th>ID</th><th>Room</th><th>Title</th><th>Priority</th><th>Status</th><th>Reported</th></tr>
            </thead>
            <tbody id="requestTable">
                <tr><td colspan="6" style="padding:12px 0; color:#9ca3af;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="fault-log" style="max-width:560px;">
        <h3>Step 2 — Assign to Subcontractor</h3><br>
        <div id="okMsg"  class="ok-msg"></div>
        <div id="errMsg" class="err-msg"></div>
        <div id="requestDetail" class="detail-box" style="display:none;"></div>
        <input type="hidden" id="selectedRequestId">
        <div class="form-group">
            <label for="staffSelect">Subcontractor</label>
            <select id="staffSelect" onchange="onStaffChange()">
                <option value="">-- Select a subcontractor --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="staffEmail">Subcontractor Email</label>
            <input type="email" id="staffEmail" readonly placeholder="Select a subcontractor above">
        </div>
        <div class="form-group">
            <label for="notes">Additional Notes (optional)</label>
            <textarea id="notes" placeholder="Any extra instructions..."></textarea>
        </div>
        <button class="assign-btn" id="assignBtn" onclick="assignJob()">Assign Job</button>
    </div>
</main>

<script>
var API         = 'http://127.0.0.1:5000';
var staffData   = [];
var allRequests = [];

// Redirect to login if not authenticated
(function checkAuth() {
    var uid  = localStorage.getItem('user_id');
    var role = localStorage.getItem('role');
    if (!uid || !role) {
        window.location.href = 'Login.html';
        return;
    }
    // Only Staff and Managers may access this page
    if (role !== 'Staff' && role !== 'Manager') {
        window.location.href = 'Dashboard.html';
    }
})();

// Build navigation
(function () {
    var role = localStorage.getItem('role') || '';
    var name = localStorage.getItem('name') || '';

    document.getElementById('userName').textContent    = name || 'Staff';
    document.getElementById('userInitial').textContent = (name || 'S')[0].toUpperCase();

    var links = [
        { href: 'Dashboard.html',     label: 'Dashboard',     roles: ['Guest','Staff','Subcontractor','Manager'] },
        { href: 'ReportFault.html',   label: 'Report Fault',  roles: ['Guest','Staff','Manager'] },
        { href: 'AssignJob.html',     label: 'Assign Jobs',   roles: ['Staff','Manager'] },
        { href: 'View Requests.html', label: 'View Requests', roles: ['Guest','Staff','Subcontractor','Manager'] },
        { href: 'Analytics.html',     label: 'Analytics',     roles: ['Manager'] },
        { href: 'Notifications.html', label: 'Notifications', roles: ['Guest','Staff','Subcontractor','Manager'] },
        { href: 'Feedback.html',      label: 'Feedback',      roles: ['Guest','Staff','Subcontractor','Manager'] },
    ];

    var nav = document.getElementById('nav-links');
    links.filter(function(l) { return l.roles.indexOf(role) !== -1; }).forEach(function(l) {
        var a = document.createElement('a');
        a.href        = l.href;
        a.textContent = l.label;
        if (l.href === 'AssignJob.html') a.className = 'current';
        nav.appendChild(a);
    });
})();

function logout() {
    var uid = localStorage.getItem('user_id');
    fetch(API + '/logout?user_id=' + uid, { method: 'POST', credentials: 'include' });
    localStorage.clear();
    window.location.href = 'Login.html';
}

function priorityClass(p) {
    if (p === 'High')   return 'priority-tag priority-urgent';
    if (p === 'Medium') return 'priority-tag priority-standard';
    return 'priority-tag priority-minor';
}

// Load open requests into the Step 1 table
function loadRequests() {
    var uid = localStorage.getItem('user_id');
    fetch(API + '/requests?user_id=' + uid, { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        allRequests = Array.isArray(data) ? data.filter(function(r) { return r.status !== 'Completed'; }) : [];
        var tbody = document.getElementById('requestTable');
        if (allRequests.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="padding:12px 0;color:#9ca3af;">No open requests.</td></tr>';
            return;
        }
        tbody.innerHTML = allRequests.map(function(r) {
            var date = r.report_time ? r.report_time.split(' ')[0] : '-';
            return '<tr id="row-' + r.id + '" onclick="selectRequest(' + r.id + ')">' +
                '<td>#' + r.id + '</td>' +
                '<td>Room ' + r.room + '</td>' +
                '<td>' + r.title + '</td>' +
                '<td><span class="' + priorityClass(r.priority) + '">' + r.priority + '</span></td>' +
                '<td>' + r.status + '</td>' +
                '<td>' + date + '</td>' +
                '</tr>';
        }).join('');
    })
    .catch(function() {
        document.getElementById('requestTable').innerHTML =
            '<tr><td colspan="6" style="color:#dc2626;padding:12px 0;">Cannot connect to server. Is Server.py running?</td></tr>';
    });
}

// Load ONLY subcontractors into the dropdown
function loadSubcontractors() {
    var uid = localStorage.getItem('user_id');
    fetch(API + '/staff?user_id=' + uid, { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!Array.isArray(data)) return;

        var subs = data.filter(function(s) { return s.role === 'Subcontractor'; });
        staffData = subs;

        var sel = document.getElementById('staffSelect');
        sel.innerHTML = '<option value="">-- Select a subcontractor --</option>';

        if (subs.length === 0) {
            var opt = document.createElement('option');
            opt.disabled    = true;
            opt.textContent = 'No subcontractors registered yet';
            sel.appendChild(opt);
            return;
        }

        subs.forEach(function(s) {
            var opt = document.createElement('option');
            opt.value       = s.user_id;
            opt.textContent = s.first_name + ' ' + s.surname;
            sel.appendChild(opt);
        });
    })
    .catch(function() {
        showErr('Could not load subcontractors. Is Server.py running?');
    });
}

// Highlight the clicked row and show its detail panel
function selectRequest(id) {
    document.getElementById('selectedRequestId').value = id;

    document.querySelectorAll('#requestTable tr').forEach(function(row) {
        row.classList.remove('selected-row');
    });
    var rowEl = document.getElementById('row-' + id);
    if (rowEl) rowEl.classList.add('selected-row');

    var req    = allRequests.find(function(r) { return r.id === id; });
    var detBox = document.getElementById('requestDetail');
    if (req) {
        detBox.innerHTML =
            '<strong>Request #' + req.id + '</strong> | Room ' + req.room + '<br>' +
            '<strong>Title:</strong> ' + req.title + '<br>' +
            '<strong>Priority:</strong> ' + req.priority + ' | <strong>Status:</strong> ' + req.status + '<br>' +
            '<strong>Description:</strong> ' + (req.description || '-');
        detBox.style.display = 'block';
    }
}

// Fill in the email when a subcontractor is selected
function onStaffChange() {
    var uid    = document.getElementById('staffSelect').value;
    var member = staffData.find(function(s) { return String(s.user_id) === String(uid); });
    document.getElementById('staffEmail').value = member ? (member.email || 'No email on record') : '';
}

// Send the PUT request to assign the job
function assignJob() {
    var requestId  = document.getElementById('selectedRequestId').value;
    var assignedTo = document.getElementById('staffSelect').value;
    var notes      = document.getElementById('notes').value.trim();
    var btn        = document.getElementById('assignBtn');
    var uid        = localStorage.getItem('user_id');  // ← FIX: include user_id in body

    document.getElementById('okMsg').style.display  = 'none';
    document.getElementById('errMsg').style.display = 'none';

    if (!requestId)  { showErr('Please select a request first.'); return; }
    if (!assignedTo) { showErr('Please select a subcontractor.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Assigning...';

    fetch(API + '/requests/' + requestId + '/assign', {
        method:      'PUT',
        credentials: 'include',
        headers:     { 'Content-Type': 'application/json' },
        body:        JSON.stringify({
            assigned_to: parseInt(assignedTo),
            notes:       notes,
            user_id:     parseInt(uid)   // ← FIX: send user_id so server can verify auth
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            var member = staffData.find(function(s) { return String(s.user_id) === String(assignedTo); });
            showOk('Job assigned to ' + (member ? member.first_name + ' ' + member.surname : 'subcontractor') + ' successfully.');
            document.getElementById('selectedRequestId').value     = '';
            document.getElementById('staffSelect').value           = '';
            document.getElementById('staffEmail').value            = '';
            document.getElementById('notes').value                 = '';
            document.getElementById('requestDetail').style.display = 'none';
            document.querySelectorAll('#requestTable tr').forEach(function(row) { row.classList.remove('selected-row'); });
            loadRequests();
        } else {
            showErr(data.error || 'Could not assign job. Please try again.');
        }
        btn.disabled    = false;
        btn.textContent = 'Assign Job';
    })
    .catch(function() {
        showErr('Cannot connect to server. Is Server.py running?');
        btn.disabled    = false;
        btn.textContent = 'Assign Job';
    });
}

function showOk(msg)  { var e = document.getElementById('okMsg');  e.textContent = msg; e.style.display = 'block'; document.getElementById('errMsg').style.display = 'none'; }
function showErr(msg) { var e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('okMsg').style.display  = 'none'; }

loadRequests();
loadSubcontractors();
</script>
</body>
</html>
