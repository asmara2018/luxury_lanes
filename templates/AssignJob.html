<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>Feedback-Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
</head>

<body>
<aside class="nav-panel">
    <h2>Luxury Lanes</h2>

<nav class="nav-links">
<a href="Dashboard.html" >Dashboard</a>
<a href="ReportFault.html">Report Fault</a>
<a href="AssignJob.html" class="current">Assign Jobs</a>
<a href="View Requests.html">View Requests</a>
<a href="Analytics.html">Analytics</a>
<a href="Notifications.html" >Notifications</a>
<a href="Feedback.html" >Feedback</a>
</nav>

<div class="nav-bottom">
<a href="login.html">Log Out</a>
</div>
</aside>

<main class="content-area">

    <div class="page-header">
        <div>
            <h1>Performance Analytics</h1>
            <p>Live overview of all maintenance activity</p>
        </div>
        <div class="staff-info">
            <span id="userName">Manager</span>
        </div>
    </div>


<input type="hidden" id="selectedRequest">

<form id="assignForm">

<div class="form-group">
<label>Staff Search</label>
<input type="text" id="staffSearch" placeholder="Search staff">
<div id="staffSuggestions"></div>
</div>

<div class="form-group">
<label>Staff Email</label>
<input type="email" id="staffEmail" readonly>
</div>

<div class="form-group">
<label>Priority</label>
<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Notes</label>
<textarea id="notes"></textarea>
</div>

<button type="submit">Assign Job + Send Email</button>

</form>

</div>

</main>

<script>

/* Sidebar Navigation */
var NAV_LINKS={

Guest:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"Report a Fault",href:"ReportFault.html"},
{label:"My Requests",href:"ViewRequests.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Feedback",href:"Feedback.html"},
{label:"Notifications",href:"Notifications.html"}
],

Staff:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"Report a Fault",href:"ReportFault.html"},
{label:"My Tasks",href:"ViewRequests.html"},
{label:"Assign a Job",href:"AssignJob.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Notifications",href:"Notifications.html"}
],

Manager:[
{label:"Dashboard",href:"Dashboard.html"},
{label:"All Requests",href:"ViewRequests.html"},
{label:"Assign a Job",href:"AssignJob.html"},
{label:"Manage Rooms",href:"ManageRooms.html"},
{label:"Analytics",href:"Analytics.html"},
{label:"Notifications",href:"Notifications.html"}
]

};

function initNav(currentPage){

let roleRaw=localStorage.getItem("role")||"Guest";
let name=localStorage.getItem("name")||"User";

let role="Guest";

if(roleRaw.toLowerCase().includes("staff")) role="Staff";
if(roleRaw.toLowerCase().includes("manager")) role="Manager";

document.getElementById("sbRole").textContent=role;

let links=NAV_LINKS[role];

document.getElementById("navLinks").innerHTML=
links.map(l=>{
let active=l.href===currentPage?" active":"";
return `<li><a href="${l.href}" class="nav-link${active}">${l.label}</a></li>`;
}).join("");

}

/* Logout */
function logout(){
localStorage.clear();
window.location.href="Login.html";
}

/* Load Requests */
async function loadRequests(){

const res=await fetch("http://127.0.0.1:5000/requests");
const data=await res.json();

let table=document.getElementById("requestTable");
table.innerHTML="";

data.forEach(req=>{
table.innerHTML+=`
<tr onclick="selectRequest(${req.id})">
<td><input type="radio" name="req"></td>
<td>${req.id}</td>
<td>${req.room}</td>
<td>${req.title}</td>
<td>${req.priority}</td>
<td>${req.status}</td>
</tr>
`;
});

}

function selectRequest(id){
document.getElementById("selectedRequest").value=id;
}

/* Staff Search */
document.getElementById("staffSearch").addEventListener("input", async function(){

let keyword=this.value;
if(keyword.length<2) return;

const res=await fetch("http://127.0.0.1:5000/staff");
const data=await res.json();

let box=document.getElementById("staffSuggestions");
box.innerHTML="";

data.forEach(staff=>{
if(staff.first_name.toLowerCase().includes(keyword.toLowerCase())){

let div=document.createElement("div");

div.textContent=staff.first_name+" "+staff.surname+" ("+staff.role+")";

div.onclick=()=>{
staffSearch.value=staff.first_name+" "+staff.surname;
staffEmail.value=staff.email;
box.innerHTML="";
};

box.appendChild(div);
}
});

});

/* Submit Assignment */
document.getElementById("assignForm").addEventListener("submit", async e=>{
e.preventDefault();

let requestId=document.getElementById("selectedRequest").value;

await fetch(`http://127.0.0.1:5000/requests/${requestId}/assign`,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
credentials:"include",
body:JSON.stringify({
assigned_to:1
})
});

alert("Job Assigned!");
loadRequests();

});

initNav("AssignJob.html");
loadRequests();

</script>

</body>
</html>
