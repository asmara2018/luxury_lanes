<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Lanes - Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#CFFDFF;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login_box{
  width:460px;
  background:white;
  padding:2.5rem;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  display:grid;
  gap:1rem;
}

.login_box h1{
  text-align:center;
}

label{
  font-weight:bold;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:12px;
  background:#2c7be5;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.signup{
  text-align:center;
  font-size:14px;
}

.signup a{
  color:#2c7be5;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="login_box">

<h1>Luxury Lanes</h1>

<label>Email</label>
<input type="email" id="email">

<label>Password</label>
<input type="password" id="password">

<button onclick="login()">Login</button>

<div class="signup">
Don’t have an account? <a href="register.html">Sign up</a>
</div>

</div>


<script>
function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email === "" || password === ""){
    alert("Please enter email and password");
    return;
  }

  fetch("http://127.0.0.1:5000/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      // store user info for dashboard
      localStorage.setItem("user_id", data.user_id);
      localStorage.setItem("role", data.role);
      localStorage.setItem("name", data.name);

      window.location.href = "Dashboard.html";
    }else{
      alert("Wrong login details");
    }
  })
  .catch(() => {
    alert("Server not running");
  });

}
</script>

</body>
</html>
