<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
</head>
<body class="auth-body">
<div class="auth-card">
    <h1>Luxury Lanes</h1>
    <p class="subtitle">Hotel Maintenance Management — sign in to continue</p>
    <div id="errMsg" class="err-msg"></div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="login()">Sign In</button>
    <p class="auth-link">No account? <a href="Register.html">Register here</a></p>
</div>
<script>
var API = 'http://127.0.0.1:5000';

function login() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn      = document.getElementById('loginBtn');
    var errEl    = document.getElementById('errMsg');
    errEl.style.display = 'none';

    if (!email || !password) { showErr('Please enter your email and password.'); return; }

    btn.disabled = true; btn.textContent = 'Signing in...';

    fetch(API + '/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('role',    data.role);
            localStorage.setItem('name',    data.name);
            localStorage.setItem('email',   data.email);
            window.location.href = 'Dashboard.html';
        } else {
            showErr(data.message || 'Incorrect email or password.');
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    })
    .catch(function() {
        showErr('Cannot connect to server. Make sure Server.py is running.');
        btn.disabled = false; btn.textContent = 'Sign In';
    });
}

function showErr(msg) {
    var el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
