<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Luxury Lanes</title>
<link rel="stylesheet" href="CSS Luxury Lanes.css">
</head>
<body class="auth-body">
<div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Register to access the maintenance system</p>
    <div id="errMsg"  class="err-msg"></div>
    <div id="okMsg"   class="ok-msg"></div>
    <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="e.g. James">
    </div>
    <div class="form-group">
        <label>Surname</label>
        <input type="text" id="surname" placeholder="e.g. Smith">
    </div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Role</label>
        <select id="role">
            <option value="Guest">Guest</option>
            <option value="Staff">Staff</option>
            <option value="Subcontractor">Subcontractor</option>
        </select>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" onkeydown="if(event.key==='Enter')register()">
    </div>
    <button class="btn-primary" id="regBtn" onclick="register()">Create Account</button>
    <p class="auth-link">Already have an account? <a href="Login.html">Sign in</a></p>
</div>
<script>
var API = 'http://127.0.0.1:5000';

function register() {
    var firstName = document.getElementById('firstName').value.trim();
    var surname   = document.getElementById('surname').value.trim();
    var email     = document.getElementById('email').value.trim();
    var role      = document.getElementById('role').value;
    var password  = document.getElementById('password').value;
    var btn       = document.getElementById('regBtn');

    document.getElementById('errMsg').style.display = 'none';
    document.getElementById('okMsg').style.display  = 'none';

    if (!firstName || !surname || !email || !password) {
        showErr('Please fill in all fields.'); return;
    }
    if (password.length < 6) {
        showErr('Password must be at least 6 characters.'); return;
    }

    btn.disabled = true; btn.textContent = 'Creating account...';

    fetch(API + '/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            first_name: firstName, surname: surname,
            email: email, role: role, password: password
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('role',    data.role);
            localStorage.setItem('name',    data.name);
            localStorage.setItem('email',   email);
            window.location.href = 'Dashboard.html';
        } else {
            showErr(data.message || 'Registration failed.');
            btn.disabled = false; btn.textContent = 'Create Account';
        }
    })
    .catch(function() {
        showErr('Cannot connect to server. Make sure Server.py is running.');
        btn.disabled = false; btn.textContent = 'Create Account';
    });
}

function showErr(msg) {
    var el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
